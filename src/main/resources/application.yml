server:
  port: ${SERVER_PORT:8085}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    certificate: ${SERVER_SSL_CERT:/etc/tls/tls.crt}
    certificate-private-key: ${SERVER_SSL_KEY:/etc/tls/tls.key}

spring:
  application:
    name: inventory-service
  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory}
    username: ${INVENTORY_DB_USER:inventory}
    password: ${INVENTORY_DB_PASSWORD:inventory}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-512}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:changeit}
      ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:JKS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak-platform.apps-crc.testing/realms/master}

inventory:
  events:
    enabled: ${INVENTORY_EVENTS_ENABLED:true}
    topic: ${INVENTORY_EVENTS_TOPIC:inventory.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info
